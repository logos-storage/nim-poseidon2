name: CI

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest]
        nim: [binary:2.2.4]
    runs-on: ${{ matrix.platform }}
    steps:
    - uses: actions/checkout@v2
    - uses: iffy/install-nim@v5
      with:
        version: ${{ matrix.nim }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Build
      run: nimble install -y
    - name: Test
      run: nimble test -y
